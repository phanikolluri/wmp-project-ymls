- name: Install Portfolio service
  hosts: all
  become: yes
  tasks:
    - name: install java
      ansible.builtin.dnf:
        name: java-21-openjdk-devel
        state: present

    - name: Create a appuser
      ansible.builtin.user:
        name: appuser
        system: yes
        shell: /bin/false

    - name: Create a app directory
      ansible.builtin.file:
        path: /app
        state: directory


    - name: extract the application source code directly to the application directory.
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/portfolio-service.tar.gz
        dest: /app
        remote_src: yes

    - name: execute permissions to a script
      ansible.builtin.file:
        path: /app/gradlew
        state: file
        mode: '0755'

    - name: build the application
      ansible.builtin.shell: chmod +x gradlew && ./gradlew bootJar --no-daemon -x test
      args:
        chdir: /app

    - name: copy the build bootJar
      ansible.builtin.shell: cp /app/build/libs/*.jar /app/portfolio-service.jar

    - name: Set ownership and permissions on /app
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: yes
        mode: 'o-rwx'

    - name: Copy Portfolio configuration file
      ansible.builtin.copy:
        src: portfolio-service.service
        dest: /etc/systemd/system/portfolio-service.service


    - name: Start service portfolio-service
      ansible.builtin.service:
        name: portfolio-service
        daemon_reload: yes
        enabled: yes
        state: restarted



